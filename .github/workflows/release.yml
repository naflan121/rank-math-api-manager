name: Build and Release Plugin

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to package and upload to an existing release
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: release_meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release_meta.outputs.tag }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"

      - name: Create production-ready plugin ZIP
        run: |
          # Create plugin directory with correct name
          mkdir -p rank-math-api-manager

          # Copy core plugin files
          cp rank-math-api-manager.php rank-math-api-manager/

          # Copy includes directory if exists
          if [ -d "includes" ]; then
            cp -r includes/ rank-math-api-manager/
          fi

          # Copy assets directory if exists
          if [ -d "assets" ]; then
            cp -r assets/ rank-math-api-manager/
          fi

          # Copy essential documentation
          [ -f "README.md" ] && cp README.md rank-math-api-manager/
          [ -f "LICENSE" ] && cp LICENSE rank-math-api-manager/
          [ -f "LICENSE.md" ] && cp LICENSE.md rank-math-api-manager/
          [ -f "CHANGELOG.md" ] && cp CHANGELOG.md rank-math-api-manager/
          [ -f "changelog.txt" ] && cp changelog.txt rank-math-api-manager/
          [ -f "readme.txt" ] && cp readme.txt rank-math-api-manager/

          # Remove any development files that may have been copied
          rm -rf rank-math-api-manager/.git* 2>/dev/null || true
          rm -rf rank-math-api-manager/.github/ 2>/dev/null || true
          rm -rf rank-math-api-manager/tests/ 2>/dev/null || true
          rm -rf rank-math-api-manager/.cursor/ 2>/dev/null || true
          rm -rf rank-math-api-manager/agent-skills/ 2>/dev/null || true
          rm -rf rank-math-api-manager/transcripts/ 2>/dev/null || true
          rm -rf rank-math-api-manager/agent-transcripts/ 2>/dev/null || true
          rm -rf rank-math-api-manager/local-notes/ 2>/dev/null || true
          rm -rf rank-math-api-manager/.notes/ 2>/dev/null || true
          rm -rf rank-math-api-manager/node_modules/ 2>/dev/null || true
          rm -f rank-math-api-manager/.DS_Store 2>/dev/null || true
          rm -f rank-math-api-manager/TODO*.md 2>/dev/null || true
          rm -f rank-math-api-manager/.env* 2>/dev/null || true
          rm -f rank-math-api-manager/.gitignore 2>/dev/null || true
          rm -f rank-math-api-manager/*.code-workspace 2>/dev/null || true

          # Create ZIP file with WordPress-compatible name
          zip -r rank-math-api-manager.zip rank-math-api-manager/

          # Verify ZIP structure
          echo "📦 ZIP Contents:"
          unzip -l rank-math-api-manager.zip | head -20

          if ! unzip -Z1 rank-math-api-manager.zip | rg '^rank-math-api-manager/$'; then
            echo "❌ ZIP root folder is missing or incorrectly named"
            exit 1
          fi

          if ! unzip -Z1 rank-math-api-manager.zip | rg '^rank-math-api-manager/rank-math-api-manager\.php$'; then
            echo "❌ Main plugin file is missing from the expected path"
            exit 1
          fi

          # Verify forbidden local artifacts are not present
          if unzip -Z1 rank-math-api-manager.zip | grep -E '(^|/)\.cursor/|(^|/)agent-skills/|\.code-workspace$|(^|/)transcripts/|(^|/)agent-transcripts/|(^|/)local-notes/|(^|/)\.notes/'; then
            echo "❌ Forbidden local artifacts detected in release ZIP"
            exit 1
          fi

          echo "✅ ZIP structure verified: root folder and main plugin file are correct"
          echo "✅ Packaging exclusions verified: no local agent artifacts in release ZIP"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          files: rank-math-api-manager.zip
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Release Completion
        run: |
          echo "✅ Release asset uploaded successfully"
          echo "📦 File: rank-math-api-manager.zip"
          echo "📋 Contents: Production-ready plugin files only"
          echo "🚀 Ready for WordPress auto-update system"
